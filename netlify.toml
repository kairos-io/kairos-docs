[build]
  base = "."
  publish = "build"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "24.13.0"

[[redirects]]
from = "/v3.7.2/docs/*"
to = "/docs/v3.7.2/:splat"
status = 302

[[redirects]]
from = "/v3.6.0/docs/*"
to = "/docs/v3.6.0/:splat"
status = 302

[[redirects]]
from = "/v3.5.7/docs/*"
to = "/docs/v3.5.7/:splat"
status = 302

[[redirects]]
from = "/getting-started/*"
to = "/quickstart/"
status = 302

[[redirects]]
from = "/hadron-docs/nvidia-extension"
to = "/hadron-docs/nvidia/discrete-x86/"
status = 301

[[redirects]]
from = "/hadron-docs/nvidia-extension/"
to = "/hadron-docs/nvidia/discrete-x86/"
status = 301

[[redirects]]
from = "/docs/operator"
to = "/operator-docs/"
status = 302

[[redirects]]
from = "/docs/operator/"
to = "/operator-docs/"
status = 302

[[redirects]]
from = "/docs/operator/*"
to = "/operator-docs/:splat"
status = 302

[[redirects]]
from = "/docs/contribution-guidelines/"
to = "https://github.com/kairos-io/kairos/blob/master/CONTRIBUTING.md"
status = 200
force = true # COMMENT: ensure that we always redirect
headers = {X-From = "Netlify"}
signed = "API_SIGNATURE_TOKEN"

[[redirects]]
  from = "/start"
  to = "/docs/start/"
  status = 302
  force = false

[[redirects]]
  from = "/products"
  to = "/docs/products/"
  status = 302
  force = false
